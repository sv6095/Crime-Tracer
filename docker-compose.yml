version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: crime-tracer-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./crime_tracer.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - MODEL_SERVICE_URL=http://ml-service:8001/predict
      - ALLOWED_ORIGINS_RAW=http://localhost:5173,http://localhost:4173,http://localhost:80
    volumes:
      - ./Backend/uploads:/app/uploads
      - ./Backend/crime_tracer.db:/app/crime_tracer.db
    depends_on:
      - ml-service
    networks:
      - crime-tracer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ml-service:
    build:
      context: ./Backend_Model
      dockerfile: Dockerfile
    container_name: crime-tracer-ml-service
    ports:
      - "8001:8001"
    environment:
      - FRONTEND_ORIGIN=http://localhost:5173
    volumes:
      - ./Backend_Model/Model_Data:/app/Model_Data:ro
    networks:
      - crime-tracer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  client-frontend:
    build:
      context: ./Client_Side_Frontend
      dockerfile: Dockerfile
    container_name: crime-tracer-client-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - crime-tracer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  server-frontend:
    build:
      context: ./Sever_Side_Frontend
      dockerfile: Dockerfile
    container_name: crime-tracer-server-frontend
    ports:
      - "4173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - crime-tracer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  crime-tracer-network:
    driver: bridge

volumes:
  backend-data:
  ml-model-data:
